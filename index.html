<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Svyasa Blockchain Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7C3AED;
      --pink: #EC4899;
      --cyan: #06B6D4;
      --yellow: #FBBF24;
      --green: #10B981;
      --orange: #F97316;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 8s ease-in-out infinite;
    }
    .blob1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 350px; height: 350px; background: var(--pink); bottom: -80px; right: -80px; animation-delay: 2s; }
    .blob3 { width: 300px; height: 300px; background: var(--cyan); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease both;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
      position: relative;
      animation: spin-border 4s linear infinite;
    }

    .avatar::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--purple), var(--pink), var(--cyan), var(--yellow), var(--purple));
      z-index: -1;
      animation: spin-border 3s linear infinite;
    }

    @keyframes spin-border {
      to { filter: hue-rotate(360deg); }
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff 0%, var(--cyan) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .bio {
      margin-top: 6px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
      background: rgba(255,255,255,0.1);
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 16px;
    }

    .link-btn:hover::before { opacity: 1; }

    /* Individual colors */
    .btn-instagram { animation-delay: 0.1s; }
    .btn-instagram:hover { border-color: #E1306C; box-shadow: 0 8px 30px rgba(225,48,108,0.3); }
    .btn-instagram::before { background: linear-gradient(135deg, rgba(225,48,108,0.15), rgba(193,53,132,0.1)); }

    .btn-twitter { animation-delay: 0.2s; }
    .btn-twitter:hover { border-color: #1DA1F2; box-shadow: 0 8px 30px rgba(29,161,242,0.3); }
    .btn-twitter::before { background: linear-gradient(135deg, rgba(29,161,242,0.15), rgba(6,182,212,0.1)); }

    .btn-website { animation-delay: 0.3s; }
    .btn-website:hover { border-color: var(--purple); box-shadow: 0 8px 30px rgba(124,58,237,0.3); }
    .btn-website::before { background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.1)); }

    .btn-other { animation-delay: 0.4s; }
    .btn-other:hover { border-color: var(--yellow); box-shadow: 0 8px 30px rgba(251,191,36,0.3); }
    .btn-other::before { background: linear-gradient(135deg, rgba(251,191,36,0.15), rgba(249,115,22,0.1)); }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
    }

    .icon-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .icon-twitter { background: linear-gradient(135deg, #1DA1F2, #0d8ed9); }
    .icon-website { background: linear-gradient(135deg, var(--purple), var(--pink)); }
    .icon-other { background: linear-gradient(135deg, var(--yellow), var(--orange)); }

    .link-text { flex: 1; }
    .link-label { font-size: 0.72rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
    .link-name { font-size: 1rem; font-weight: 600; color: #fff; }

    .arrow {
      color: rgba(255,255,255,0.3);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
    }
    .link-btn:hover .arrow { transform: translateX(4px); color: rgba(255,255,255,0.8); }

    /* Footer */
    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0;
    }
    @keyframes drift {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  const colors = ['#7C3AED','#EC4899','#06B6D4','#FBBF24','#10B981','#F97316'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.width = p.style.height = (3 + Math.random() * 4) + 'px';
    container.appendChild(p);
  }
</script>
</body>
</html>
